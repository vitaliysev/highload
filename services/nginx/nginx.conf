worker_processes auto;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    limit_req_zone $binary_remote_addr zone=api:10m rate=200r/s;
    limit_req_status 429;

    keepalive_timeout  65;
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    server_tokens      off;

    upstream listing_service {
        server listing-service:8080;
        keepalive 32;
    }

    upstream search_service {
        server search-service:8080;
        keepalive 32;
    }

    server {
        listen 80;

        proxy_connect_timeout  5s;
        proxy_read_timeout     30s;
        proxy_send_timeout     10s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        location /health {
            proxy_pass http://listing_service;
        }

        location /api/v1/listings/search {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://search_service;
        }

        location /api/v1/listings {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://listing_service;
        }

        location /api/v1/users {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://listing_service;
        }

        error_page 429 @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"error":"rate limit exceeded","retry_after":"1s"}';
        }
    }
}
