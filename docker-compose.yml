services:

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      listing-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  listing-service:
    build:
      context: ./services/listing
      dockerfile: Dockerfile
    environment:
      DB_DSN:       "postgres://postgres:postgres@postgres:5432/marketplace?sslmode=disable&pool_max_conns=20"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      REDIS_ADDR:   "redis:6379"
      HTTP_PORT:    "8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  search-service:
    build:
      context: ./services/search
      dockerfile: Dockerfile
    environment:
      DB_DSN:     "postgres://postgres:postgres@postgres:5432/marketplace?sslmode=disable&pool_max_conns=20"
      REDIS_ADDR: "redis:6379"
      HTTP_PORT:  "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    environment:
      DB_DSN:       "postgres://postgres:postgres@postgres:5432/marketplace?sslmode=disable&pool_max_conns=5"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 128M

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       marketplace
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/listing/migrations:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=256MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c max_connections=100
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=4.0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: >
      redis-server
        --maxmemory 200mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 256M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
